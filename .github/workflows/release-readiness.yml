name: release-readiness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'tests/**'
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/release-readiness.yml'
  push:
    branches: ['main']

permissions:
  contents: read

jobs:
  contracts-extension:
    name: Release Readiness / Contracts and Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:ts
      - run: pnpm format:check
      - run: pnpm --filter @chatgpt-anonymizer/contracts test
      - run: pnpm --filter @chatgpt-anonymizer/extension test
      - run: pnpm build:contracts
      - run: pnpm build:extension

  engine:
    name: Release Readiness / Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/local-engine/pyproject.toml'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./services/local-engine[dev]"
      - run: python -m ruff check services/local-engine
      - run: python -m pytest services/local-engine/tests/unit -q
      - run: python -m pytest services/local-engine/tests/integration -q
      - run: python -m build services/local-engine --outdir services/local-engine/dist

  e2e:
    name: Release Readiness / E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm --filter @chatgpt-anonymizer/e2e test

  readiness-summary:
    name: Release Readiness / Summary
    runs-on: ubuntu-latest
    needs:
      - contracts-extension
      - engine
      - e2e
    if: always()
    steps:
      - name: Publish readiness summary
        env:
          CONTRACTS_EXTENSION_RESULT: ${{ needs.contracts-extension.result }}
          ENGINE_RESULT: ${{ needs.engine.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          {
            echo "## Release Readiness Summary"
            echo
            echo "| Area | Result |"
            echo "| --- | --- |"
            echo "| Contracts and Extension | ${CONTRACTS_EXTENSION_RESULT} |"
            echo "| Local Engine | ${ENGINE_RESULT} |"
            echo "| E2E | ${E2E_RESULT} |"
            echo
            echo "Extension artifact: \`.output/\`"
            echo
            echo "Engine artifact: \`services/local-engine/dist/\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CONTRACTS_EXTENSION_RESULT" != "success" ] || [ "$ENGINE_RESULT" != "success" ] || [ "$E2E_RESULT" != "success" ]; then
            exit 1
          fi
